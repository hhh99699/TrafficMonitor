name: Build TrafficMonitor Lite Release

on:
  workflow_dispatch:

  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:

  build:

    runs-on: windows-latest

    strategy:
      matrix:
        include:

          - platform: x64
            output: Bin/x64/Release (lite)

          - platform: x86
            output: Bin/Release (lite)

          - platform: ARM64EC
            output: Bin/ARM64EC/Release (lite)

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: |
          msbuild TrafficMonitor_Lite.sln ^
            -p:Configuration="Release (lite)" ^
            -p:Platform=${{ matrix.platform }} ^
            -p:PlatformToolset=v143

      - name: Package
        shell: powershell
        run: |

          $zip="TrafficMonitor_${{ matrix.platform }}_Lite.zip"

          Compress-Archive `
            "${{ matrix.output }}\*" `
            $zip

      - name: Upload Artifact

        uses: actions/upload-artifact@v4

        with:
          name: TrafficMonitor_${{ matrix.platform }}
          path: TrafficMonitor_${{ matrix.platform }}_Lite.zip

      - name: Publish Release

        if: startsWith(github.ref,'refs/tags/')

        uses: softprops/action-gh-release@v2

        with:

          files: TrafficMonitor_${{ matrix.platform }}_Lite.zip
